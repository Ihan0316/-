<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mini test3</title>
    <link rel="stylesheet" href="assets/css/test2.css"> <!-- CSS 파일 링크 -->
</head>

<body>

    <!-- 네비게이션 섹션 -->
    <nav>
        <ul>

            <li><a href="8_test.html">Mini test1.html</a></li>
            <li><a href="9_test.html">Mini test2.html</a></li>
            <li><a href="10_test.html">Mini test3.html</a></li>
            <li><a href="index.html">Main</a></li>
        </ul>
    </nav>

    <!-- 음식 카테고리 선택 -->
    <div class="food">
        <ul>
            <li><a href="#" onclick="changeMenu('수제마늘곱창', 'images/한식.png', '₩26,000')">Korean</a></li>
            <li><a href="#" onclick="changeMenu('트러플베이컨까르보나라', 'images/양식.png', '₩15,000')">Western</a></li>
            <li><a href="#" onclick="changeMenu('차슈덮밥', 'images/일식.png', '₩6,000')">Japanese</a></li>
        </ul>
    </div>

    <!-- 결과 섹션 -->
    <div id="result">
        <!-- 선택된 메뉴 정보가 여기에 표시됩니다 -->
    </div>

    <script>
        function changeMenu(name, img, price) {
            var result = document.querySelector('#result');
            result.style.backgroundImage = 'url(' + img + ')';
            result.innerHTML = `
                <div class="menu-info">
                    <div class="menu-name">Menu: ${name}</div>
                    <div class="menu-price">Price: ${price}</div>
                </div>
            `;
        }
    </script>

</body>

</html>
